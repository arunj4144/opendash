<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenDash">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16181B"/>
      <stop offset="1" stop-color="#0B0C0E"/>
    </linearGradient>
    <linearGradient id="orange" x1="150" y1="410" x2="360" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E05500"/>
      <stop offset="1" stop-color="#FF7A1A"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" stroke="#000000" stroke-opacity="0.35"/>

  <!-- speedometer / dash arc: ~250 deg sweep, open at the bottom -->
  <path d="M136 360 A160 160 0 1 1 376 360"
        fill="none" stroke="#2A2D31" stroke-width="26" stroke-linecap="round"/>
  <!-- lit portion of the gauge -->
  <path d="M136 360 A160 160 0 0 1 196 176"
        fill="none" stroke="url(#orange)" stroke-width="26" stroke-linecap="round"/>

  <!-- turn-by-turn arrow: up the shaft, sweep right, arrowhead -->
  <g stroke="url(#orange)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M212 356 L212 268 Q212 214 266 214 L322 214"/>
  </g>
  <!-- arrowhead -->
  <path d="M300 166 L360 214 L300 262 Z" fill="url(#orange)"/>
</svg>
